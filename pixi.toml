[workspace]
channels = ["conda-forge", "bioconda", "nodefaults"]
name = "ngs-trim"
platforms = ["linux-64"]
version = "0.5.7"

[tasks]

[dependencies]
snakemake = ">=9.0.1,<10"
snakemake-storage-plugin-http = ">=0.3.0,<1"
conda = ">=25.1.1,<27"

[environments]
test = { features = ["test"] }
format = { features = ["format"], no-default-feature = true }

[feature.test.dependencies]
pytest = ">=9.0.2"
graphviz = ">=12.2.1"

[feature.format.dependencies]
ruff = ">=0.15.1"
snakefmt = ">=0.11.5"
